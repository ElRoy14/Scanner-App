    <div class="flex flex-col items-center justify-center text-center">

      <div class="mb-8 bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden animate-slide-down">
        <!-- Header Form -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4">
          <h2 class="text-xl font-bold text-white flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Crear Nuevo Producto
          </h2>
        </div>

        <!-- Form Content -->
        <form [formGroup]="formulario" (ngSubmit)="crearProducto()" class="p-6 space-y-6">

          <!-- Codigo Field -->
          <div class="space-y-3 flex flex-col items-center w-full">

            <label for="barCode"
              class="block text-sm font-semibold text-gray-900 flex items-center gap-2">

              <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
              </svg>

              Código de Barras
              <span class="text-red-500">*</span>

            </label>

            <!-- Contenedor del lector -->
            <div class="w-full max-w-md relative">

              <video
                #video
                autoplay
                playsinline
                class="w-full h-64 rounded-lg border-2 border-gray-300 object-cover bg-black">
              </video>

              <!-- marco de escaneo -->
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-4/5 h-20 border-2 border-green-400 rounded-md"></div>
              </div>

            </div>

            <!-- botones -->
            <div class="flex gap-4 mt-2">

              <button
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition"
                (click)="startScanner()">
                Iniciar Escaneo
              </button>

              <button
                class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition"
                (click)="stopScanner()">
                Detener
              </button>

            </div>

            <!-- resultado -->
            <div *ngIf="scannedCode" class="w-full max-w-md mt-3">

              <input
                id="barCode"
                readonly
                [value]="scannedCode"
                type="text"
                formControlName="barCode"
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg
                      focus:border-blue-500 focus:ring-2 focus:ring-blue-200
                      outline-none transition-all duration-200"
              />

            </div>

          </div>

          <!-- Nombre Field -->
          <div class="space-y-2 flex flex-col items-center">
            <label for="name" class="block text-sm font-semibold text-gray-900 flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
              </svg>
              Nombre del Producto
              <span class="text-red-500">*</span>
            </label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Ej: Producto A, Servicio B..."
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200"
            />
          </div>

          <!-- Presentación Field -->
          <div class="space-y-2 flex flex-col items-center">
            <label for="presentation" class="block text-sm font-semibold text-gray-900 flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
              Presentación del Producto
              <span class="text-red-500">*</span>
            </label>
            <select
              id="presentation"
              formControlName="presentation"
              class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all duration-200"
            >
              <option value="" disabled>Selecciona una presentación</option>
              <option value="Unidad">Unidad</option>
              <option value="Caja">Caja</option>
            </select>
          </div>

                    <!-- Buttons -->
          <div class="flex gap-3 pt-4 border-t border-gray-200">
            <button
              type="button"
              (click)="toggleFormulario()"
              class="flex-1 px-4 py-2.5 bg-white border-2 border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 transition-all duration-200"
            >
              Cancelar
            </button>

            <button
              type="submit"
              [disabled]="formulario.invalid"
              class="flex-1 px-4 py-2.5 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Crear Producto
            </button>
          </div>
        </form>
      </div>
    </div>

    <div>
      <p *ngIf="errorMessage" class="text-red-500 text-sm">
        {{ errorMessage }}
      </p>
    </div>

    <div class="flex flex-col items-center justify-center text-center">
      <!-- Tabla de productos agregados -->
      <div *ngIf="productos().length" class="mt-3">
        <div class="border border-gray-300 rounded-lg overflow-hidden overflow-y-scroll max-h-48">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-300">
              <tr>
                <th class="px-3 py-2 text-left text-xs font-semibold text-gray-700">Producto</th>
                <th class="px-3 py-2 text-center text-xs font-semibold text-gray-700">Código de Barras</th>
                <th class="px-3 py-2 text-right text-xs font-semibold text-gray-700">Presentación</th>
                <th class="px-3 py-2 w-8"></th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              <tr *ngFor="let producto of productos(); let i = index" class="hover:bg-gray-50">
                <td class="px-3 py-2 text-gray-900">{{ producto.name }}</td>
                <td class="px-3 py-2 text-center text-gray-700">{{ producto.barCode }}</td>
                <td class="px-3 py-2 text-right text-gray-700">{{ producto.presentation }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
