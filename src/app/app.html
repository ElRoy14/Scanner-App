    <div style="text-align:center; padding:20px flex items-center">
      <h2>Escáner de Código de Barras</h2>

      <video #video width="300" height="200" style="border:1px solid black"></video>

      <div *ngIf="scannedCode" style="margin-top:20px">
        <strong>Código detectado:</strong> {{ scannedCode }}
      </div>

      <div style="margin-top:20px space-x-2 flex justify-center gap-2">
        <button class="border rounded-sm p-1" (click)="startScanner()">Iniciar Escaneo</button>
        <button class="border rounded-sm p-1" (click)="stopScanner()">Detener</button>
      </div>
    </div>
